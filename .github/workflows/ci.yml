name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Start Expo Web
        run: |
          npm run start:web &
          echo $! > expo.pid
        shell: bash

      - name: Wait for Expo Web to be ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:19006/ >/dev/null; then
              echo "Expo Web is ready"
              break
            fi
            echo "Waiting for Expo Web..."
            sleep 5
          done
        shell: bash

      - name: Run Playwright E2E Tests
        run: |
          npx playwright test tests/e2e/feed-e2e.spec.ts --config=playwright.config.ts --reporter list
        shell: bash

      - name: Cleanup
        if: always()
        run: |
          if [ -f expo.pid ]; then kill -9 $(cat expo.pid) || true; fi
        shell: bash
